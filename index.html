<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Part 3 · Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #c8a96e;
    --accent2: #7eb8a4;
    --text: #e8e2d9;
    --text-muted: #6b6560;
    --text-mid: #a09890;
    --reveal1: #1a2420;
    --reveal2: #1e1a12;
    --tag-bg: #222;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--accent);
    letter-spacing: 0.02em;
  }

  .logo span {
    color: var(--text-muted);
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    margin-left: 10px;
    font-style: normal;
  }

  .counter {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface2);
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* TOPIC FILTER */
  .topic-bar {
    padding: 14px 24px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    scrollbar-width: none;
  }
  .topic-bar::-webkit-scrollbar { display: none; }

  .topic-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .topic-btn:hover { border-color: var(--accent); color: var(--accent); }
  .topic-btn.active {
    background: var(--accent);
    color: #0e0e0e;
    border-color: var(--accent);
    font-weight: 500;
  }

  /* MAIN CARD AREA */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 32px 20px 100px;
  }

  .card {
    width: 100%;
    max-width: 680px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    position: relative;
  }

  .card-topic-tag {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 20px 0;
  }

  .tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    background: rgba(200, 169, 110, 0.1);
    padding: 3px 10px;
    border-radius: 10px;
    border: 1px solid rgba(200, 169, 110, 0.2);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .card-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .card-question {
    padding: 16px 20px 20px;
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    line-height: 1.45;
    color: var(--text);
    font-weight: 400;
  }

  /* REVEAL SECTIONS */
  .reveal-section {
    border-top: 1px solid var(--border);
    overflow: hidden;
  }

  .reveal-btn {
    width: 100%;
    padding: 14px 20px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    color: var(--text-mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    transition: background 0.2s, color 0.2s;
    text-align: left;
  }

  .reveal-btn:hover { background: var(--surface2); }

  .reveal-btn.revealed-1 {
    background: var(--reveal1);
    color: var(--accent2);
  }

  .reveal-btn.revealed-2 {
    background: var(--reveal2);
    color: var(--accent);
  }

  .reveal-icon {
    font-size: 16px;
    transition: transform 0.3s;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .reveal-btn.open .reveal-icon { transform: rotate(180deg); }

  .reveal-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .reveal-content.open { max-height: 1000px; }

  /* POINTS CONTENT */
  .points-content {
    padding: 4px 20px 20px;
    background: var(--reveal1);
  }

  .point-item {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 14px;
    line-height: 1.5;
    color: #b8d4cc;
  }

  .point-dot {
    color: var(--accent2);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .phrases-row {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid rgba(126, 184, 164, 0.15);
  }

  .phrases-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .phrase-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .chip {
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--accent2);
    background: rgba(126, 184, 164, 0.08);
    border: 1px solid rgba(126, 184, 164, 0.2);
    padding: 3px 10px;
    border-radius: 8px;
  }

  /* FULL ANSWER CONTENT */
  .answer-content {
    padding: 4px 20px 20px;
    background: var(--reveal2);
  }

  .answer-en {
    font-size: 14px;
    line-height: 1.7;
    color: #e8ddc8;
    margin-bottom: 14px;
  }

  .answer-divider {
    height: 1px;
    background: rgba(200, 169, 110, 0.15);
    margin-bottom: 14px;
  }

  .answer-cn {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text-muted);
  }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 20px 24px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .nav-btn {
    padding: 12px 28px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .nav-btn:hover { border-color: var(--text-mid); color: var(--text); }

  .nav-btn.primary {
    background: var(--accent);
    color: #0e0e0e;
    border-color: var(--accent);
    font-weight: 600;
  }

  .nav-btn.primary:hover { opacity: 0.9; }

  .progress-bar {
    width: 100%;
    max-width: 680px;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    margin-bottom: 24px;
  }

  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 1px;
    transition: width 0.4s ease;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }

  .empty-state h3 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    margin-bottom: 10px;
    color: var(--text-mid);
  }

  @media (max-width: 480px) {
    .card-question { font-size: 17px; }
    header { padding: 16px 16px 12px; }
    main { padding: 24px 12px 100px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Part 3 <span>flashcards</span></div>

</header>

<div class="topic-bar" id="topicBar"></div>

<main>
  <div class="progress-bar">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div id="cardContainer"></div>
</main>

<div class="bottom-nav">
  <button class="nav-btn" onclick="prevCard()">← Prev</button>
  <button class="nav-btn primary" onclick="nextCard()">Next →</button>
</div>

// State
const topics = ["All", ...new Set(data.map(d => d.topic))];
let filtered = [...data];
let current = 0;
let activeTopic = "All";

// Shuffle
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

filtered = shuffle([...data]);

// Build topic buttons
const topicBar = document.getElementById('topicBar');
topics.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'topic-btn' + (t === 'All' ? ' active' : '');
  btn.textContent = t;
  btn.onclick = () => {
    activeTopic = t;
    document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filtered = shuffle(t === 'All' ? [...data] : data.filter(d => d.topic === t));
    current = 0;
    renderCard();
  };
  topicBar.appendChild(btn);
});

function renderCard() {
  const container = document.getElementById('cardContainer');
  const counterEl = document.getElementById('counter');
  const progressEl = document.getElementById('progressFill');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><h3>No cards found</h3><p>Try a different topic.</p></div>';
    return;
  }

  const card = filtered[current];
  counterEl.textContent = `${current + 1} / ${filtered.length}`;
  progressEl.style.width = `${((current + 1) / filtered.length) * 100}%`;

  container.innerHTML = `
    <div class="card">
      <div class="card-topic-tag">
        <span class="tag">${card.topic}</span>
        <span class="card-num">Part 3</span>
      </div>
      <div class="card-question">${card.q}</div>

      <div class="reveal-section">
        <button class="reveal-btn" id="btn1" onclick="toggleReveal(1)">
          <span>💡 Key Points + Phrases</span>
          <span class="reveal-icon">▾</span>
        </button>
        <div class="reveal-content" id="content1">
          <div class="points-content">
            ${card.points.map(p => `
              <div class="point-item">
                <span class="point-dot">·</span>
                <span>${p}</span>
              </div>
            `).join('')}
            <div class="phrases-row">
              <div class="phrases-label">Key Phrases</div>
              <div class="phrase-chips">
                ${card.phrases.map(ph => `<span class="chip">${ph}</span>`).join('')}
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="reveal-section">
        <button class="reveal-btn" id="btn2" onclick="toggleReveal(2)">
          <span>📝 Full Answer</span>
          <span class="reveal-icon">▾</span>
        </button>
        <div class="reveal-content" id="content2">
          <div class="answer-content">
            <div class="answer-en">${card.en}</div>
            <div class="answer-divider"></div>
            <div class="answer-cn">${card.cn}</div>
          </div>
        </div>
      </div>
    </div>
  `;
}

function toggleReveal(num) {
  const btn = document.getElementById(`btn${num}`);
  const content = document.getElementById(`content${num}`);
  const isOpen = content.classList.contains('open');

  if (isOpen) {
    content.classList.remove('open');
    btn.classList.remove('open', `revealed-${num}`);
  } else {
    content.classList.add('open');
    btn.classList.add('open', `revealed-${num}`);
  }
}

function nextCard() {
  if (current < filtered.length - 1) {
    current++;
  } else {
    filtered = shuffle([...filtered]);
    current = 0;
  }
  renderCard();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function prevCard() {
  if (current > 0) {
    current--;
    renderCard();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

renderCard();
</script>
